<!doctype html>

<html lang="vi" xmnls :th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
            rel="stylesheet"
    />
    <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
            rel="stylesheet"
    />
    <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
    />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#359EFF",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {display: "Inter"},
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px",
                    },
                },
            },
        };
    </script>
    <title>Giỏ hàng | Sneaker Store</title>
    <style>
        body {
            font-family: "Inter", sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: "FILL" 0,
            "wght" 400,
            "GRAD" 0,
            "opsz" 24;
        }

        .cart-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .cart-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .cart-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Ẩn spinner trên Chrome, Safari, Edge */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Ẩn spinner trên Firefox */
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body
        class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased"
>
<!-- Top Navigation Bar -->
<div th:replace="User/layout/header :: header"></div>
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Breadcrumb & Title -->
    <div class="mb-8 flex items-center gap-3">
        <!-- Icon -->
        <div
                class="w-12 h-12 flex items-center justify-center rounded-xl bg-primary/10 text-primary"
        >
            <span class="material-symbols-outlined text-2xl">shopping_cart</span>
        </div>

        <!-- Title -->
        <div>
            <h2
                    class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white"
            >
                Giỏ hàng của bạn
            </h2>

            <span
                    id="cartCount"
                    class="inline-block mt-1 text-sm px-3 py-1 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-medium"
            >
    0 sản phẩm
  </span>
        </div>
    </div>
    <div class="flex flex-col lg:flex-row gap-8">
        <!-- Left Column: Product List -->

        <div class="lg:w-[70%]">
            <!-- Product List (Scrollable) -->
            <div
                    class="space-y-4 max-h-[445px] overflow-y-auto pr-2 cart-scroll"
                    id="cartList"
            >
                <!-- Product Card 1 -->
            </div>

            <!-- Continue Shopping -->
            <div class="pt-6">
                <a
                        class="inline-flex items-center text-sm font-semibold text-primary hover:gap-2 transition-all"
                        href="/home"
                >
              <span class="material-symbols-outlined text-sm mr-2">
                arrow_back
              </span>

                    Tiếp tục mua sắm
                </a>
            </div>
        </div>
        <!-- Right Column: Order Summary (Sticky) -->
        <div class="lg:w-[30%]">
            <div
                    class="sticky top-24 bg-white dark:bg-slate-900 rounded-xl p-6 shadow-lg border border-slate-100 dark:border-slate-800"
            >
                <h3 class="text-xl font-bold mb-6">Tóm tắt đơn hàng</h3>
                <div class="space-y-4 mb-8">
                    <div
                            class="flex justify-between text-slate-600 dark:text-slate-400"
                    >
                        <span class="font-medium">Tạm tính</span>
                        <span
                                id="subtotal"
                                class="font-bold text-slate-900 dark:text-slate-100"
                        >0₫</span
                        >
                    </div>
                    <div
                            class="flex justify-between text-slate-600 dark:text-slate-400"
                    >
                        <span class="font-medium">Phí vận chuyển</span>
                        <span
                                id="shipping"
                                class="font-bold text-slate-900 dark:text-slate-100"
                        >30.000₫</span
                        >
                    </div>
                    <div
                            class="pt-4 border-t border-slate-100 dark:border-slate-800 flex justify-between items-end"
                    >
                <span class="text-sm font-bold uppercase text-slate-500"
                >Tổng thanh toán</span
                >
                        <span id="total" class="text-2xl font-black text-primary"
                        >0₫</span
                        >
                    </div>
                </div>
                <a
                        th:href="@{/user/order}"
                        class="w-full bg-slate-900 dark:bg-primary text-white py-4 rounded-xl font-bold text-lg hover:shadow-xl hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                >
                    Tiến hành thanh toán
                    <span class="material-symbols-outlined">arrow_forward</span>
                </a>
                <div class="mt-6 space-y-3">
                    <div class="flex items-center gap-3 text-xs text-slate-400">
                <span class="material-symbols-outlined text-base"
                >verified_user</span
                >
                        Thanh toán an toàn và bảo mật
                    </div>
                    <div class="flex items-center gap-3 text-xs text-slate-400">
                <span class="material-symbols-outlined text-base"
                >local_shipping</span
                >
                        Miễn phí vận chuyển cho đơn hàng từ 5tr
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<!-- Simple Footer -->
<div th:replace="User/layout/footer :: footer"></div>
</body>
<script>
    function formatCurrency(number) {
        return number.toLocaleString("vi-VN") + "₫";
    }

    function renderCart() {
        const cartList = document.getElementById("cartList");
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        let totalQuantity = cart.reduce(
            (sum, item) => sum + (item.quantity || 1),
            0
        );

        const cartCountEl = document.getElementById("cartCount");
        if (cartCountEl) {
            cartCountEl.innerText = totalQuantity + " sản phẩm";
        }
        if (cart.length === 0) {
            cartList.innerHTML = `
    <div class="flex flex-col items-center justify-center py-16 text-center">

        <!-- Icon -->
        <div class="w-24 h-24 mb-4 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800">
            <span class="material-symbols-outlined text-5xl text-slate-400">
                shopping_cart
            </span>
        </div>

        <!-- Title -->
        <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-2">
            Giỏ hàng của bạn đang trống 🛒
        </h3>

        <!-- Message -->
        <p class="text-slate-500 dark:text-slate-400 mb-6">
            Hãy thêm vài đôi giày xịn xò để bắt đầu mua sắm nhé 😍
        </p>

        <!-- Button -->
        <a href="/home"
           class="px-6 py-2 bg-primary text-white rounded-lg font-semibold hover:opacity-90 transition">
            Mua sắm ngay
        </a>
    </div>
`;
            document.getElementById("subtotal").textContent = "0₫";
            document.getElementById("shipping").textContent = "0₫";
            document.getElementById("total").textContent = "0₫";
            return;
        }
        let html = "";
        cart.forEach((item, idx) => {
            html += `
      <div class="group relative bg-white dark:bg-slate-900 rounded-xl p-4 sm:p-6 shadow-sm border border-slate-100 dark:border-slate-800 flex flex-col sm:flex-row gap-6 transition-all hover:shadow-md hover:-translate-y-0.5">
        <div class="w-full sm:w-32 h-32 bg-slate-50 dark:bg-slate-800 rounded-lg overflow-hidden shrink-0">
          <img class="w-full h-full object-cover" src="${item.image}" alt="${item.name}"/>
        </div>
        <div class="flex flex-1 flex-col justify-between">
          <div class="flex justify-between items-start">
            <div>
              <h3 class="text-lg font-bold group-hover:text-primary transition-colors">${item.name}</h3>
              <p class="text-sm text-slate-500">Brand: ${item.brand || ""}</p>
              <div class="mt-1 flex gap-4 text-xs font-medium text-slate-600 dark:text-slate-400 uppercase tracking-wider">
                <span>Size: ${item.size || ""}</span>
                <span>Color: ${item.color || ""}</span>
              </div>
            </div>
            <button class="text-slate-300 hover:text-red-500 transition-colors" onclick="removeCartItem(${idx})">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
          <div class="mt-4 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden h-10">
              <button class="px-3 h-full hover:bg-slate-50 dark:hover:bg-slate-800 border-r" onclick="updateQuantity(${idx}, -1)">-</button>
              <input class="w-12 text-center border-none focus:ring-0 bg-transparent text-sm font-semibold" type="number" value="${item.quantity}" min="1" onchange="setQuantity(${idx}, this.value)"/>
              <button class="px-3 h-full hover:bg-slate-50 dark:hover:bg-slate-800 border-l" onclick="updateQuantity(${idx}, 1)">+</button>
            </div>
            <div class="text-right">
              <p class="text-xs text-slate-400 uppercase font-bold">Thành tiền</p>
              <p class="text-lg font-bold text-slate-900 dark:text-slate-100">${formatCurrency(item.price * item.quantity)}</p>
            </div>
          </div>
        </div>
      </div>
    `;
        });
        cartList.innerHTML = html;

        // Tính tổng tiền
        let subtotal = cart.reduce(
            (sum, item) => sum + item.price * item.quantity,
            0,
        );
        let shipping = subtotal >= 5000000 ? 0 : 30000; // Miễn phí ship nếu >= 5tr
        let total = subtotal + shipping;

        // Cập nhật lên giao diện
        document.getElementById("subtotal").textContent =
            formatCurrency(subtotal);
        document.getElementById("shipping").textContent =
            formatCurrency(shipping);
        document.getElementById("total").textContent = formatCurrency(total);
    }

    function updateQuantity(idx, delta) {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart[idx].quantity = Math.max(1, cart[idx].quantity + delta);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
        updateCartCount();
    }

    function setQuantity(idx, value) {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart[idx].quantity = Math.max(1, parseInt(value) || 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
        updateCartCount();
    }

    function removeCartItem(idx) {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.splice(idx, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
        updateCartCount();
    }

    document.addEventListener("DOMContentLoaded", renderCart);
</script>
</html>
