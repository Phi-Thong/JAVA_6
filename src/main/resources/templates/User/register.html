<!DOCTYPE html>

<html class="h-full" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Đăng ký - Sneaker Store</title>
    <!-- Inter font from Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
          rel="stylesheet"/>
    <!-- Tailwind CSS v3 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': {opacity: '0', transform: 'translateY(10px)'},
                            '100%': {opacity: '1', transform: 'translateY(0)'},
                        }
                    }
                }
            }
        }
    </script>
    <style data-purpose="custom-styling">
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-effect {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="h-full bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 flex items-center justify-center p-4">
<!-- BEGIN: MainContainer -->
<main class="w-full max-w-5xl bg-white dark:bg-zinc-900 rounded-3xl shadow-2xl overflow-hidden flex min-h-[520px] animate-fade-in"
      data-purpose="signup-card">

    <!-- Left -->
    <section
            onclick="window.location.href='/home'"
            class="hidden lg:flex lg:w-1/2 relative overflow-hidden cursor-pointer group transition duration-300 hover:scale-[1.02]"
            data-purpose="hero-image-section">

        <img alt="Premium Sneaker"
             class="absolute inset-0 w-full h-full object-cover transition duration-500 group-hover:scale-110"
             src="https://plus.unsplash.com/premium_photo-1710107447132-063440229ee4?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"/>

        <div class="absolute inset-0 bg-black/50 flex flex-col justify-end p-10">
            <div class="relative z-10">
                <h1 class="text-3xl font-bold text-white mb-3 tracking-tight">
                    Bắt đầu hành trình của bạn
                </h1>
                <p class="text-zinc-300 text-base max-w-md">
                    Tạo tài khoản để khám phá thế giới giày thời trang và ưu đãi dành riêng cho bạn.
                </p>
            </div>
        </div>
    </section>

    <!-- Right -->
    <section class="w-full lg:w-1/2 p-6 md:p-8 lg:p-10 flex flex-col justify-center">

        <!-- Header -->
        <div class="text-center lg:text-left mb-5">
            <h2 class="flex items-center justify-center lg:justify-start gap-3 text-2xl font-bold tracking-tight mb-1 text-blue-600">

                <!-- ICON XỊN -->
                <div class="w-10 h-10 flex items-center justify-center rounded-xl
                    bg-gradient-to-br from-blue-500 to-indigo-600
                    text-white shadow-lg shadow-blue-500/30
                    transition duration-300 hover:scale-110 hover:shadow-blue-500/50">
                    <i class="fa-solid fa-shoe-prints"></i>
                </div>

                Tạo tài khoản
            </h2>

            <p class="text-zinc-500 dark:text-zinc-400 text-sm">
                Tham gia cùng chúng tôi ngay hôm nay
            </p>
        </div>

        <!-- Form -->
        <form action="#" class="space-y-4" method="POST">

            <div class="space-y-1">
                <label class="text-sm font-medium">Họ và tên</label>
                <input class="w-full px-4 py-2.5 rounded-xl border bg-zinc-50 dark:bg-zinc-800/50"
                       placeholder="Nguyễn Văn A" type="text"/>
            </div>

            <div class="space-y-1">
                <label class="text-sm font-medium">Email</label>
                <input class="w-full px-4 py-2.5 rounded-xl border bg-zinc-50 dark:bg-zinc-800/50"
                       placeholder="example@email.com" type="email"/>
            </div>

            <div class="space-y-1">
                <label class="text-sm font-medium">Mật khẩu</label>
                <input class="w-full px-4 py-2.5 rounded-xl border bg-zinc-50 dark:bg-zinc-800/50"
                       type="password"/>
            </div>

            <div class="space-y-1">
                <label class="text-sm font-medium">Xác nhận mật khẩu</label>
                <input class="w-full px-4 py-2.5 rounded-xl border bg-zinc-50 dark:bg-zinc-800/50"
                       type="password"/>
            </div>

            <div class="flex items-start gap-2">
                <input type="checkbox"/>
                <label class="text-sm text-zinc-600">
                    Tôi đồng ý với <span class="text-blue-600">điều khoản</span>
                </label>
            </div>

            <button class="w-full text-white font-semibold py-3 rounded-xl bg-blue-600 hover:bg-blue-700">
                Đăng ký
            </button>

            <div class="text-center">
                <p class="text-sm text-zinc-500">
                    Đã có tài khoản?
                    <a th:href="@{/login}" class="text-blue-600 font-semibold">Đăng nhập</a>
                </p>
            </div>

        </form>
    </section>
</main>
<!-- END: MainContainer -->
<!-- BEGIN: DarkModeToggle -->

<!-- END: DarkModeToggle -->
</body>
</html>
