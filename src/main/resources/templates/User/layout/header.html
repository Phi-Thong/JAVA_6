<header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-800 shadow-sm transition-all"
        th:fragment="header">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-8">
            <a href="/home" class="flex items-center gap-3 group">

                <!-- Icon -->
                <div class="p-2 rounded-xl bg-primary/10 group-hover:bg-primary/20 transition">
        <span class="material-symbols-outlined text-primary text-3xl">
            local_mall
        </span>
                </div>

                <!-- Logo Text -->
                <span class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white">
        SNEAKER<span class="text-primary">STORE</span>
    </span>

            </a>
        </div>
        <div class="flex items-center gap-4">
            <div class="relative hidden sm:block">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
                <input class="pl-10 pr-4 py-2 bg-slate-100 dark:bg-slate-800 border-none rounded-full text-sm focus:ring-2 focus:ring-primary w-64"
                       placeholder="Tìm kiếm sản phẩm..." type="text"/>
            </div>

            <a th:href="@{/user/shoppingCart}"
               class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg relative inline-block">

                <span class="material-symbols-outlined">shopping_cart</span>

                <span class="absolute top-1 right-1 bg-primary text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">
                    2
                </span>

            </a>
            <div class="relative inline-block">

                <!-- Button Avatar -->
                <button onclick="toggleUserMenu()"
                        class="flex items-center gap-2 p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition">

                    <!-- Avatar -->
                    <img src="/img/default.jpg"
                         alt="avatar"
                         class="w-8 h-8 rounded-full object-cover border">

                    <!-- Text -->
                    <div class="text-left leading-tight">
                        <div class="text-xs text-gray-500">Xin chào</div>
                        <span class="font-semibold"
                              th:text="${session.user != null ? session.user.ten : 'Guest'}"></span>
                    </div>

                    <!-- Icon -->
                    <span class="material-symbols-outlined text-gray-500 text-sm">
            expand_more
        </span>

                </button>

                <!-- Dropdown Menu -->
                <div id="userMenu"
                     class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl shadow-lg overflow-hidden">

                    <a href="/user/profile"
                       class="flex items-center gap-2 px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                        <span class="material-symbols-outlined text-lg">person</span>
                        Thông tin cá nhân
                    </a>

                    <a href="/logout"
                       class="flex items-center gap-2 px-4 py-3 hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 transition">
                        <span class="material-symbols-outlined text-lg">logout</span>
                        Đăng xuất
                    </a>

                </div>

            </div>
        </div>
    </div>
    <script>
        function toggleUserMenu() {
            const menu = document.getElementById("userMenu");
            menu.classList.toggle("hidden");
        }
    </script>
</header>
