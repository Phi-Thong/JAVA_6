<main class="flex-1 ml-64 flex overflow-hidden bg-white h-screen" th:fragment="ChatAdmin">
    <style>
        .chat-bubble {
            max-width: 320px;
            min-width: 60px;
            padding: 12px 16px;
            border-radius: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            word-break: break-word;
            overflow-wrap: break-word;
            max-height: 120px; /* Giới hạn chiều cao */
            overflow-y: auto; /* Hiện thanh cuộn khi vượt quá */
            margin-bottom: 2px;
        }

        .chat-bubble.admin {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 0;
        }

        .chat-bubble.user {
            background: #e5e7eb;
            color: black;
            border-bottom-left-radius: 0;
        }
    </style>
    <!-- Column 1: Conversation List -->
    <section class="w-80 flex-shrink-0 border-r border-slate-100 flex flex-col bg-slate-50/30">
        <div class="p-4 border-b border-slate-100 bg-white">
            <h2 class="text-lg font-bold text-slate-800 mb-3">Chats</h2>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
                <input class="w-full pl-9 pr-4 py-2 bg-slate-100 border-none rounded-lg text-sm focus:ring-1 focus:ring-blue-600 focus:bg-white transition-all"
                       placeholder="Tìm khách hàng..." type="text"/>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto chat-scrollbar">
            <!-- Chat Item (Active) -->

        </div>
    </section>
    <!-- Column 2: Main Chat Frame -->
    <section class="w-[600px] flex flex-col min-w-0 min-h-0 bg-slate-50/10">
        <!-- Chat Header -->
        <header class="h-16 flex-shrink-0 flex items-center justify-between px-6 bg-white border-b border-slate-100">
            <div class="flex items-center gap-3">
                <div class="flex -space-x-2">
                    <img
                            alt="Chat header avatar"
                            class="w-10 h-10 rounded-full border-2 border-white"
                            id="chat-header-avatar"
                            src="https://ui-avatars.com/api/?name=Khách"
                    />
                </div>
                <div>
                    <h2 class="text-sm font-bold text-slate-900 leading-none mb-1" id="chat-header-name">Khách</h2>
                    <span class="flex items-center gap-1.5 text-[10px] text-green-600 font-bold uppercase tracking-wider">
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> Đang hoạt động
        </span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button class="p-2 text-slate-400 hover:text-blue-600 transition-colors rounded-lg">
                    <span class="material-symbols-outlined">call</span>
                </button>
                <button class="p-2 text-slate-400 hover:text-blue-600 transition-colors rounded-lg">
                    <span class="material-symbols-outlined">videocam</span>
                </button>
                <button class="p-2 text-slate-400 hover:text-blue-600 transition-colors rounded-lg">
                    <span class="material-symbols-outlined">more_vert</span>
                </button>
            </div>
        </header>
        <!-- Chat Body -->
        <div id="admin-chat-body"
             class="flex-1 min-h-0 overflow-y-auto p-6 space-y-6 chat-scrollbar">
        </div>
        <!-- Chat Footer (Input) -->
        <div class="p-4 bg-white border-t border-slate-100">
            <div class="flex items-center gap-2 bg-slate-100 rounded-xl p-2 focus-within:ring-2 focus-within:ring-blue-200 transition-all">
                <div class="flex gap-1">
                    <button class="p-2 text-slate-400 hover:text-blue-600 transition-colors">
                        <span class="material-symbols-outlined">add_circle</span>
                    </button>
                    <button class="p-2 text-slate-400 hover:text-blue-600 transition-colors">
                        <span class="material-symbols-outlined">image</span>
                    </button>
                    <button class="p-2 text-slate-400 hover:text-blue-600 transition-colors">
                        <span class="material-symbols-outlined">sentiment_satisfied</span>
                    </button>
                </div>
                <input class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-2"
                       placeholder="Nhập tin nhắn..." type="text"/>
                <button class="bg-blue-600 text-white p-2.5 rounded-lg flex items-center justify-center hover:bg-blue-700 transition-colors shadow-lg shadow-blue-200">
                    <span class="material-symbols-outlined text-lg">send</span>
                </button>
            </div>
        </div>
    </section>
    <!-- Column 3: Customer Info -->
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script>
        let stompClient = null;
        let currentConversationId = 1;
        let adminId = null;

        document.addEventListener("DOMContentLoaded", function () {

            const input = document.querySelector('input[placeholder="Nhập tin nhắn..."]');
            const sendBtn = document.querySelector('.bg-blue-600.text-white');

            // =========================
            // INIT
            // =========================
            const savedId = localStorage.getItem("conversationId");
            if (savedId) {
                currentConversationId = parseInt(savedId);
            }

            adminId = getUserIdFromJwt();

            loadHistory(currentConversationId);
            connectAdminChat(currentConversationId);

            // =========================
            // SEND MESSAGE
            // =========================
            function sendAdminMessage(content) {

                if (!stompClient || !stompClient.connected) return;

                const msg = {
                    conversationId: currentConversationId,
                    content: content,
                    senderId: adminId,
                    senderName: "Nhân viên"
                };

                stompClient.send("/app/admin.sendMessage", {}, JSON.stringify(msg));
            }

            // =========================
            // CLICK SEND
            // =========================
            sendBtn.addEventListener('click', function () {

                const content = input.value.trim();
                if (!content) return;

                sendAdminMessage(content);
                input.value = '';
            });

            // =========================
            // ENTER SEND
            // =========================
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendBtn.click();
                }
            });

            // =========================
            // CONNECT WEBSOCKET (FIXED)
            // =========================
            function connectAdminChat(conversationId) {

                if (stompClient !== null) {
                    try {
                        stompClient.disconnect();
                    } catch (e) {
                        console.log("WS disconnect error:", e);
                    }
                }

                const socket = new SockJS('/ws-chat');
                stompClient = Stomp.over(socket);

                stompClient.connect({}, function () {

                    console.log("ADMIN CONNECTED");

                    stompClient.subscribe('/topic/conversation.' + conversationId, function (message) {

                        const msg = JSON.parse(message.body);
                        appendAdminMessage(msg);
                    });

                }, function (error) {
                    console.error("WS ERROR:", error);
                });
            }

            // =========================
            // RENDER MESSAGE (FIX SCOPE)
            // =========================
            window.appendAdminMessage = function (msg) {

                const chatBody = document.getElementById('admin-chat-body');

                const isAdmin = msg.senderId === adminId;

                const div = document.createElement('div');
                div.className = 'flex flex-col ' + (isAdmin ? 'items-end' : 'items-start');

                div.innerHTML = `
  <div class="flex items-end ${isAdmin ? 'flex-row-reverse' : ''} gap-2 max-w-[80%]">
    <div style="
      ${isAdmin ? 'background-color: #2563eb; color: white;' : 'background-color: #e5e7eb; color: black;'}
      padding: 12px 16px;
      border-radius: 1rem;
      ${isAdmin ? 'border-bottom-right-radius: 0;' : 'border-bottom-left-radius: 0;'}
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      max-width: 320px;
      word-break: break-word;
      overflow-wrap: break-word;
      max-height: 120px;
      overflow-y: auto;
      "
    >
      <p class="text-sm leading-relaxed" style="margin:0;word-break:break-word;white-space:pre-line;">${msg.content}</p>
    </div>
    <span class="text-[10px] text-slate-400 mb-1">
      ${new Date().toLocaleTimeString('vi-VN', {
                    hour: '2-digit',
                    minute: '2-digit'
                })}
    </span>
  </div>
`;
                chatBody.appendChild(div);
                chatBody.scrollTop = chatBody.scrollHeight;
            };

            // đoạn sau
            function loadConversationList() {
                fetch('/api/chat/conversations')
                    .then(res => res.json())
                    .then(data => {
                        const listDiv = document.querySelector('.chat-scrollbar');
                        listDiv.innerHTML = '';
                        data.forEach(convo => {
                            const item = document.createElement('div');
                            item.className = 'p-4 hover:bg-slate-50 flex gap-3 cursor-pointer transition-colors border-b border-slate-50';
                            item.onclick = () => {
                                openConversation(convo.id);
                                updateChatHeader(convo);
                            };
                            item.innerHTML = `
                    <div class="relative flex-shrink-0">
                        <img alt="Customer avatar" class="w-12 h-12 rounded-full object-cover"
                            src="${convo.customerAvatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(convo.customerName)}"/>
                        <span class="absolute bottom-0 right-0 w-3 h-3 ${convo.online ? 'bg-green-500' : 'bg-slate-300'} border-2 border-white rounded-full"></span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start mb-0.5">
                            <h3 class="text-sm font-semibold text-slate-900 truncate">${convo.customerName}</h3>
                            <span class="text-[10px] text-slate-500 font-medium whitespace-nowrap">${convo.lastActive || ''}</span>
                        </div>
                        <p class="text-xs text-slate-500 truncate">${convo.lastMessage || ''}</p>
                    </div>
                `;
                            listDiv.appendChild(item);
                        });

                        // Khi vừa load trang, cập nhật header đúng conversation đang mở
                        if (data.length > 0) {
                            const current = data.find(c => c.id === currentConversationId) || data[0];
                            updateChatHeader(current);
                        }
                    })
                    .catch(err => console.error("LOAD CONVERSATION LIST ERROR:", err));
            }

            // Gọi khi load trang
            loadConversationList();


        });

        // =========================
        // LOAD HISTORY (FIXED GLOBAL)
        // =========================
        function loadHistory(conversationId) {

            fetch('/api/chat/history/' + conversationId)
                .then(res => res.json())
                .then(data => {

                    const chatBody = document.getElementById('admin-chat-body');
                    chatBody.innerHTML = '';

                    data.forEach(msg => window.appendAdminMessage(msg));
                })
                .catch(err => console.error("LOAD HISTORY ERROR:", err));
        }

        // =========================
        // OPEN CONVERSATION
        // =========================
        function openConversation(id) {

            currentConversationId = id;

            localStorage.setItem("conversationId", id);


            loadHistory(id);
            connectAdminChat(id);
        }

        // =========================
        // JWT HELPERS
        // =========================
        function getJwtFromCookie() {
            const match = document.cookie.match(/(^| )jwt=([^;]+)/);
            return match ? match[2] : null;
        }

        function getUserIdFromJwt() {
            const token = getJwtFromCookie();
            if (!token) return null;
            const payload = jwt_decode(token);
            return payload.userId || payload.sub;
        }

        // đoạn sau
        function updateChatHeader(convo) {
            document.getElementById('chat-header-avatar').src =
                convo.customerAvatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(convo.customerName);
            document.getElementById('chat-header-name').textContent = convo.customerName;
        }

    </script>
</main>
