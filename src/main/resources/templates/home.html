<!doctype html>

<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <script th:inline="javascript">
        var isLoggedIn = /*[[${#authorization.expression('isAuthenticated()')}]]*/ false;
    </script>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
            rel="stylesheet"
    />
    <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
    />
    <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
    />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0056b2",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        display: ["Inter"],
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px",
                    },
                },
            },
        };
    </script>
    <title>Sneaker Store - Shop</title>
</head>
<body
        class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 tracking-tight leading-relaxed"
>
<div th:replace="User/layout/header :: header"></div>
<main class="max-w-7xl mx-auto px-4 py-8 flex gap-8">
    <aside
            class="w-[250px] shrink-0 hidden md:block border-r border-slate-100 dark:border-slate-800 pr-8"
    >
        <div class="sticky top-24 space-y-8">
            <div
                    class="border-b border-slate-100 dark:border-slate-800 last:border-0"
            >
                <h3
                        class="flex items-center gap-2 text-sm font-bold mb-4 uppercase tracking-wider text-slate-500"
                >
                    <span class="material-symbols-outlined text-base">search</span>
                    Tìm kiếm
                </h3>
                <div class="relative">
                    <input
                            class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg py-2 px-3 text-sm focus:ring-2 focus:ring-primary"
                            placeholder="Tên sản phẩm..."
                            type="text"
                    />
                </div>
            </div>
            <div
                    class="border-b border-slate-100 dark:border-slate-800 last:border-0"
            >
                <h3
                        class="flex items-center gap-2 text-sm font-bold mb-4 uppercase tracking-wider text-slate-500"
                >
                    <span class="material-symbols-outlined text-base">sell</span>
                    Thương hiệu
                </h3>
                <div class="space-y-2">
                    <label
                            th:each="brand : ${brands}"
                            class="flex items-center gap-2 cursor-pointer group"
                    >
                        <input
                                class="rounded border-slate-300 text-primary focus:ring-primary"
                                type="checkbox"
                                th:value="${brand.tenThuongHieu}"
                                th:data-id="${brand.id}"
                        />
                        <span
                                class="text-sm group-hover:text-primary transition-colors"
                                th:text="${brand.tenThuongHieu}"
                        ></span>
                    </label>
                </div>
            </div>
            <div
                    class="border-b border-slate-100 dark:border-slate-800 last:border-0"
            >
                <h3
                        class="flex items-center gap-2 text-sm font-bold mb-4 uppercase tracking-wider text-slate-500"
                >
              <span class="material-symbols-outlined text-base"
              >straighten</span
              >
                    Kích thước
                </h3>
                <div id="size-list" class="grid grid-cols-4 gap-2">
                    <button
                            th:each="size : ${sizes}"
                            th:attr="data-size=${size}"
                            class="border border-slate-200 dark:border-slate-700 py-2 rounded text-xs font-medium hover:border-primary hover:text-primary transition-all"
                            th:text="${size}"
                            type="button"
                    ></button>
                </div>
            </div>

        </div>
    </aside>
    <section class="flex-1 space-y-16">
        <div id="all-products">
            <div
                    class="flex items-center justify-between mb-8 border-b border-slate-200 dark:border-slate-800 pb-4"
            >
                <h2 class="flex items-center gap-2 text-2xl font-bold">
              <span class="material-symbols-outlined text-3xl"
              >inventory_2</span
              >
                    Tất cả sản phẩm
                </h2>
                <div class="flex items-center gap-2">
              <span class="flex items-center gap-1 text-sm text-slate-500">
                <span class="material-symbols-outlined text-base">sort</span>
                Sắp xếp:
              </span>
                    <select
                            id="sort-select"
                            class="bg-transparent border-none text-sm font-medium focus:ring-0 cursor-pointer"
                    >
                        <option value="newest">Mới nhất</option>
                        <option value="price-asc">Giá: Thấp đến Cao</option>
                        <option value="price-desc">Giá: Cao đến Thấp</option>
                    </select>
                </div>
            </div>
            <div
                    id="product-list"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 transition-opacity duration-300"
            ></div>

            <!--  phân trang  -->
            <div id="pagination" class="flex justify-center mt-12 gap-2"></div>
        </div>
        <div id="featured-products">
            <div class="flex items-center justify-between mb-8 border-b border-slate-200 dark:border-slate-800 pb-4">
                <h2 class="flex items-center gap-2 text-2xl font-bold uppercase tracking-tight">
                    <span class="material-symbols-outlined text-3xl">star</span>
                    Sản phẩm nổi bật
                </h2>
            </div>
            <div id="featured-products-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
        <div id="best-sellers">
            <div class="flex items-center justify-between mb-8 border-b border-slate-200 dark:border-slate-800 pb-4">
                <h2 class="flex items-center gap-2 text-2xl font-bold uppercase tracking-tight text-red-600">
                    <span class="material-symbols-outlined text-3xl">local_fire_department</span>
                    Sản phẩm bán chạy
                </h2>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            <div id="best-sellers-pagination" class="flex justify-center mt-8 gap-2"></div>
        </div>
    </section>
</main>
<div th:replace="User/layout/footer :: footer"></div>
<div
        id="toast"
        style="
        display: none;
        position: fixed;
        top: 30px;
        right: 30px;
        z-index: 9999;
        background: #8074dd;
        color: #fff;
        padding: 12px 24px;
        border-radius: 8px;
        transition: opacity 0.3s;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        font-weight: 600;
        font-size: 16px;
      "
></div>
</body>
<div th:replace="User/Chat ::chat-widget "></div>

<script>
    //
    let selectedSize = null;
    let selectedBrands = [];

    // Hàm render sản phẩm
    function renderProducts(products) {
        const list = document.getElementById("product-list");
        if (!products || products.length === 0) {
            list.innerHTML = `
    <div class="col-span-full text-center py-12">
      <div class="inline-block p-6 bg-slate-100 dark:bg-slate-700 rounded-2xl shadow-lg animate-pulse">
        <span class="material-symbols-outlined text-6xl text-primary mb-4">search_off</span>
        <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 mb-2">Ôi không!</h2>
        <p class="text-slate-500 dark:text-slate-300 text-sm">
          Chúng tôi không tìm thấy sản phẩm nào phù hợp 
        </p>
       <button
  onclick="window.location.href='/home'"
  class="mt-4 bg-primary text-white dark:text-slate-900 dark:bg-white py-2 px-4 rounded-xl text-sm font-semibold hover:bg-primary/80 dark:hover:bg-slate-300 transition-all"
>
  Thử lại
</button>
      </div>
    </div>
  `;
            return;
        }
        list.innerHTML = products
            .map(
                (p) => `
      <div
        class="group bg-white dark:bg-slate-800 rounded-xl overflow-hidden shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] hover:shadow-[0_20px_25px_-5px_rgba(0,0,0,0.1),0_10px_10px_-5px_rgba(0,0,0,0.04)] transition-all duration-300 border border-transparent hover:border-primary/20"
      >
        <a href="/detail/${p.id}">
          <div class="aspect-square relative overflow-hidden bg-slate-50 rounded-t-xl">
            <img
              class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
              src="${p.anhChinh || ""}"
              alt="Ảnh sản phẩm"
            />
          </div>
          <div class="p-4 space-y-2">
            <div>
              <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                ${p.brand ? p.brand.tenThuongHieu : ""}
              </p>
              <h3 class="font-semibold text-sm text-slate-800 dark:text-slate-100 truncate group-hover:text-primary transition-colors">
                ${p.tenSanPham || ""}
              </h3>
            </div>
            <p class="font-bold text-primary text-base">
              ${Number(p.gia).toLocaleString("vi-VN")}₫
            </p>
            <div class="flex gap-2 pt-3">
              <button
                class="add-to-cart-home flex-[1.6] flex items-center justify-center gap-1 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-[9px] font-semibold py-2 px-3 rounded-xl whitespace-nowrap hover:bg-primary dark:hover:bg-primary dark:hover:text-white transition-all duration-300 uppercase tracking-wide"
                data-id="${p.id}"
                data-name="${p.tenSanPham}"
                data-price="${p.gia}"
                data-image="${p.anhChinh}"
                 data-brand="${p.brand ? p.brand.tenThuongHieu : ""}"
                type="button"
              >
                <span class="material-symbols-outlined text-xs">shopping_cart</span>
                Thêm vào giỏ
              </button>
              <button
                class="flex-[1] flex items-center justify-center gap-1 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-[9px] font-semibold py-2 px-3 rounded-xl whitespace-nowrap hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white transition-all duration-300 uppercase tracking-wide"
              >
                <span class="material-symbols-outlined text-xs">visibility</span>
                Chi tiết
              </button>
            </div>
          </div>
        </a>
      </div>
    `,
            )
            .join("");
    }

    // Hàm render phân trang

    function renderPagination(totalPages, currentPage) {
        const pagination = document.getElementById("pagination");
        let html = "";
        for (let i = 0; i < totalPages; i++) {
            html += `<a href="#" class="w-10 h-10 flex items-center justify-center rounded-full border border-slate-200 dark:border-slate-800 text-sm font-medium hover:bg-primary hover:text-white hover:border-primary transition-all duration-300 page-link${i === currentPage ? " bg-primary text-white border-primary" : ""}" data-page="${i}">${i + 1}</a> `;
        }
        if (currentPage < totalPages - 1) {
            html += `<a href="#" class="w-10 h-10 flex items-center justify-center rounded-full border border-slate-200 dark:border-slate-800 text-sm font-medium hover:bg-primary hover:text-white hover:border-primary transition-all duration-300 page-link" data-page="${currentPage + 1}">
      <span class="material-symbols-outlined text-sm">chevron_right</span>
    </a>`;
        }
        pagination.innerHTML = html;
        document.querySelectorAll(".page-link").forEach((link) => {
            link.onclick = function (e) {
                e.preventDefault();
                loadProducts(Number(this.dataset.page)); // Sửa tại đây
            };
        });
    }

    // Lắng nghe sự kiện nhập liệu ở ô tìm kiếm sản phẩm
    document
        .querySelector('input[placeholder="Tên sản phẩm..."]')
        .addEventListener("input", function () {
            const keyword = this.value.trim();
            loadProducts(0, keyword); // Gọi lại loadProducts với từ khóa tìm kiếm
        });

    //
    let selectedSort = "newest"; // Thêm biến lưu trạng thái sort

    // Lắng nghe sự kiện thay đổi sort
    document.getElementById("sort-select").addEventListener("change", function () {
        selectedSort = this.value;
        loadProducts(0);
    });

    function loadProducts(page = 0, keyword = "") {
        const list = document.getElementById("product-list");
        list.style.opacity = 0;

        let url = `/api/products?page=${page}&size=8`;

        // Thêm size
        if (selectedSize) {
            url += `&productSize=${selectedSize}`;
        }

        // Thêm brand
        if (selectedBrands.length > 0) {
            selectedBrands.forEach((id) => {
                url += `&brandId=${id}`;
            });
        }

        // Thêm keyword tìm kiếm nếu có
        if (keyword) {
            url += `&keyword=${encodeURIComponent(keyword)}`;
        }

        // Thêm sort
        if (selectedSort === "price-asc") {
            url += `&sort=gia,asc`;
        } else if (selectedSort === "price-desc") {
            url += `&sort=gia,desc`;
        } else {
            url += `&sort=createdDate,desc`; // hoặc trường ngày tạo của bạn
        }

        fetch(url)
            .then((response) => response.json())
            .then((data) => {
                setTimeout(() => {
                    renderProducts(data.content);
                    list.style.opacity = 1;
                    renderPagination(data.totalPages, data.number);
                }, 200);
            });
    }

    // Khi trang load xong thì load sản phẩm
    // document.addEventListener("DOMContentLoaded", function () {
    //   loadProducts();
    // });

    // Thêm vào giỏ hàng
    document
        .getElementById("product-list")
        .addEventListener("click", async function (e) {
            const btn = e.target.closest(".add-to-cart-home");
            if (!btn) return;
            e.stopPropagation();

            e.preventDefault();
            const product = {
                id: btn.getAttribute("data-id"),
                name: btn.getAttribute("data-name"),
                price: btn.getAttribute("data-price"),
                image: btn.getAttribute("data-image"),
                brand: btn.getAttribute("data-brand"),
                quantity: 1,
            };

            if (isLoggedIn) {
                // Nếu có cart localStorage, đồng bộ lên server trước
                let localCart = JSON.parse(localStorage.getItem("cart")) || [];
                if (localCart.length > 0) {
                    // Gửi từng sản phẩm trong localCart lên server
                    for (const item of localCart) {
                        await fetch("/api/cart/add", {
                            method: "POST",
                            headers: {"Content-Type": "application/json"},
                            credentials: "include",
                            body: JSON.stringify({
                                productId: item.id,
                                quantity: item.quantity,
                            }),
                        });
                    }
                    // Xóa cart localStorage sau khi đồng bộ
                    localStorage.removeItem("cart");
                }

                // Thêm sản phẩm hiện tại vào cart server
                fetch("/api/cart/add", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    credentials: "include",
                    body: JSON.stringify({
                        productId: product.id,
                        quantity: 1,
                    }),
                })
                    .then((res) => res.json())
                    .then((cart) => {
                        if (window.currentCart) window.currentCart = null;
                        updateCartCount && updateCartCount(cart);
                        showToast("Đã thêm vào giỏ hàng!");
                    });
            } else {
                // Lưu vào localStorage như cũ
                let cart = JSON.parse(localStorage.getItem("cart")) || [];
                const index = cart.findIndex((item) => item.id == product.id);
                if (index >= 0) {
                    cart[index].quantity += 1;
                } else {
                    cart.push(product);
                }
                localStorage.setItem("cart", JSON.stringify(cart));
                updateCartCount && updateCartCount();
                showToast("Đã thêm vào giỏ hàng!");
            }
        });

    // Toast thông báo
    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.style.display = "block";
        toast.style.opacity = "1";
        setTimeout(() => {
            toast.style.opacity = "0";
            setTimeout(() => {
                toast.style.display = "none";
            }, 300);
        }, 1000);
    }

    // Lọc sản phẩm theo thương hiệu1919
    document
        .querySelectorAll('input[type="checkbox"][data-id]')
        .forEach(function (checkbox) {
            checkbox.addEventListener("change", function () {
                const checked = Array.from(
                    document.querySelectorAll(
                        'input[type="checkbox"][data-id]:checked',
                    ),
                );

                //  lưu state
                selectedBrands = checked.map((cb) => cb.getAttribute("data-id"));

                //  gọi lại loadProducts
                loadProducts(0);
            });
        });
    // thêm tí rau bún vào cho nút được chọn size

    document
        .getElementById("size-list")
        .addEventListener("click", function (e) {
            if (e.target.tagName === "BUTTON") {
                selectedSize = e.target.getAttribute("data-size");

                document
                    .querySelectorAll("#size-list button")
                    .forEach((btn) =>
                        btn.classList.remove(
                            "bg-primary",
                            "text-white",
                            "border-primary",
                        ),
                    );

                e.target.classList.add("bg-primary", "text-white", "border-primary");

                //  gọi lại API duy nhất
                loadProducts(0);
            }
        });
    // tìm kiếm của header
    document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search);
        const keyword = urlParams.get("keyword") || "";
        loadProducts(0, keyword);
    });

    //
    function updateCartCount(cart) {
        let badge = document.getElementById("cart-count");
        if (!badge) return;
        let total = 0;
        if (typeof isLoggedIn !== "undefined" && isLoggedIn) {
            if (cart) {
                total = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
                badge.innerText = total > 99 ? "99+" : total;
                badge.classList.toggle("hidden", total === 0);
            } else {
                fetch("/api/cart", {credentials: "include"})
                    .then((res) => res.json())
                    .then((cart) => {
                        total = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
                        badge.innerText = total > 99 ? "99+" : total;
                        badge.classList.toggle("hidden", total === 0);
                    });
            }
        } else {
            let localCart = JSON.parse(localStorage.getItem("cart")) || [];
            total = localCart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            badge.innerText = total > 99 ? "99+" : total;
            badge.classList.toggle("hidden", total === 0);
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        updateCartCount();
    });
    // khung chat vs nhân viên
    // của sản phẩm bán chạy
    function renderBestSellers(products) {
        const list = document.querySelector("#best-sellers .grid");
        list.style.opacity = 0; // Ẩn trước khi render

        setTimeout(() => {
            if (!products || products.length === 0) {
                list.innerHTML = "<p>Không có sản phẩm bán chạy.</p>";
            } else {
                list.innerHTML = products
                    .map(
                        (p) => `
  <div
    class="group bg-white dark:bg-slate-800 rounded-xl overflow-hidden shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] hover:shadow-[0_20px_25px_-5px_rgba(0,0,0,0.1),0_10px_10px_-5px_rgba(0,0,0,0.04)] transition-all duration-300 border border-transparent hover:border-primary/20"
  >
    <a href="/detail/${p.id}" class="block hover:no-underline">
      <div class="aspect-square relative overflow-hidden bg-slate-50 rounded-t-xl">
        <img
          class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
          src="${p.anhChinh || ""}"
          alt="Ảnh sản phẩm"
        />
      </div>
      <div class="p-4 space-y-2">
        <div>
          <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
            ${p.brand ? p.brand.tenThuongHieu : ""}
          </p>
          <h3 class="font-semibold text-sm text-slate-800 dark:text-slate-100 truncate group-hover:text-primary transition-colors">
            ${p.tenSanPham || ""}
          </h3>
        </div>
        <p class="font-bold text-primary text-base">
          ${Number(p.gia).toLocaleString("vi-VN")}₫
        </p>
      </div>
    </a>
    <div class="flex gap-2 pt-3 px-4 pb-4">
      <button
        class="add-to-cart-home flex-[1.6] flex items-center justify-center gap-1 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-[9px] font-semibold py-2 px-3 rounded-xl whitespace-nowrap hover:bg-primary dark:hover:bg-primary dark:hover:text-white transition-all duration-300 uppercase tracking-wide"
        data-id="${p.id}"
        data-name="${p.tenSanPham}"
        data-price="${p.gia}"
        data-image="${p.anhChinh}"
        data-brand="${p.brand ? p.brand.tenThuongHieu : ""}"
        type="button"
      >
        <span class="material-symbols-outlined text-xs">shopping_cart</span>
        Thêm vào giỏ
      </button>
      <button
        class="flex-[1] flex items-center justify-center gap-1 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-[9px] font-semibold py-2 px-3 rounded-xl whitespace-nowrap hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white transition-all duration-300 uppercase tracking-wide"
        onclick="window.location.href='/detail/${p.id}'"
        type="button"
      >
        <span class="material-symbols-outlined text-xs">visibility</span>
        Chi tiết
      </button>
    </div>
  </div>
  `
                    )
                    .join("");
            }
            list.style.opacity = 1; // Hiện lại với hiệu ứng mượt
        }, 200);

        // Thêm vào giỏ hàng cho khu vực best-sellers
        list.onclick = async function (e) {
            const btn = e.target.closest(".add-to-cart-home");
            if (!btn) return;
            e.stopPropagation();
            e.preventDefault();
            const product = {
                id: btn.getAttribute("data-id"),
                name: btn.getAttribute("data-name"),
                price: btn.getAttribute("data-price"),
                image: btn.getAttribute("data-image"),
                brand: btn.getAttribute("data-brand"),
                quantity: 1,
            };

            if (isLoggedIn) {
                let localCart = JSON.parse(localStorage.getItem("cart")) || [];
                if (localCart.length > 0) {
                    for (const item of localCart) {
                        await fetch("/api/cart/add", {
                            method: "POST",
                            headers: {"Content-Type": "application/json"},
                            credentials: "include",
                            body: JSON.stringify({
                                productId: item.id,
                                quantity: item.quantity,
                            }),
                        });
                    }
                    localStorage.removeItem("cart");
                }
                fetch("/api/cart/add", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    credentials: "include",
                    body: JSON.stringify({
                        productId: product.id,
                        quantity: 1,
                    }),
                })
                    .then((res) => res.json())
                    .then((cart) => {
                        if (window.currentCart) window.currentCart = null;
                        updateCartCount && updateCartCount(cart);
                        showToast("Đã thêm vào giỏ hàng!");
                    });
            } else {
                let cart = JSON.parse(localStorage.getItem("cart")) || [];
                const index = cart.findIndex((item) => item.id == product.id);
                if (index >= 0) {
                    cart[index].quantity += 1;
                } else {
                    cart.push(product);
                }
                localStorage.setItem("cart", JSON.stringify(cart));
                updateCartCount && updateCartCount();
                showToast("Đã thêm vào giỏ hàng!");
            }
        };
    }

    function renderBestSellersPagination(totalPages, currentPage) {
        const pagination = document.getElementById("best-sellers-pagination");
        let html = "";
        for (let i = 0; i < totalPages; i++) {
            html += `<a href="#" class="w-8 h-8 flex items-center justify-center rounded-full border border-slate-200 dark:border-slate-800 text-xs font-medium hover:bg-primary hover:text-white hover:border-primary transition-all duration-300 best-sellers-page-link${i === currentPage ? " bg-primary text-white border-primary" : ""}" data-page="${i}">${i + 1}</a> `;
        }
        pagination.innerHTML = html;
        document.querySelectorAll(".best-sellers-page-link").forEach((link) => {
            link.onclick = function (e) {
                e.preventDefault();
                loadBestSellers(Number(this.dataset.page));
            };
        });
    }

    function loadBestSellers(page = 0) {
        const list = document.querySelector("#best-sellers .grid");

        // 👉 Hiệu ứng fade out + scale nhẹ
        list.style.transition = "all 0.3s ease";
        list.style.opacity = 0;
        list.style.transform = "translateY(10px)";

        // 👉 Skeleton loading (xịn hơn spinner)
        list.innerHTML = Array(8).fill().map(() => `
        <div class="animate-pulse bg-white rounded-2xl p-4 shadow">
            <div class="bg-gray-200 h-40 rounded-xl mb-3"></div>
            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
            <div class="h-4 bg-gray-200 rounded w-1/2"></div>
        </div>
    `).join('');

        fetch(`/api/products/best-sellers?page=${page}&size=8`)
            .then((res) => res.json())
            .then((data) => {

                setTimeout(() => {
                    renderBestSellers(data.content);
                    renderBestSellersPagination(data.totalPages, data.number);

                    // 👉 Fade in + slide lên
                    requestAnimationFrame(() => {
                        list.style.opacity = 1;
                        list.style.transform = "translateY(0)";
                    });
                    scrollToBestSellers();

                }, 300); // delay nhẹ cho mượt
            });
    }

    function scrollToBestSellers() {
        const section = document.querySelector("#best-sellers");

        if (!section) return;

        const offset = 80; // 👉 chỉnh số này nếu bạn có navbar cao hơn
        const top = section.getBoundingClientRect().top + window.scrollY - offset;

        window.scrollTo({
            top: top,
            behavior: "smooth"
        });
    }

    // Gọi API khi trang load xong
    document.addEventListener("DOMContentLoaded", function () {
        fetch("/api/products/best-sellers")
            .then((res) => res.json())
            .then((data) => renderBestSellers(data));
    });
    document.addEventListener("DOMContentLoaded", function () {
        loadBestSellers(0);
    });

    // hàm của lấy sản phẩm nổi bật
    function renderFeaturedProducts(products) {
        const list = document.getElementById("featured-products-list");
        if (!products || products.length === 0) {
            list.innerHTML = "<p>Không có sản phẩm nổi bật.</p>";
            return;
        }
        list.innerHTML = products.map(p => `
        <div class="group bg-white dark:bg-slate-800 rounded-xl overflow-hidden shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] hover:shadow-[0_20px_25px_-5px_rgba(0,0,0,0.1),0_10px_10px_-5px_rgba(0,0,0,0.04)] transition-all duration-300 border border-transparent hover:border-primary/20">
            <a href="/detail/${p.id}" class="block hover:no-underline">
                <div class="aspect-square relative overflow-hidden bg-slate-50 rounded-t-xl">
                    <img class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${p.anhChinh || ""}" alt="Ảnh sản phẩm"/>
                    <span class="absolute top-4 left-4 bg-primary text-white text-[8px] font-black px-2.5 py-1 rounded-full uppercase tracking-[0.2em] shadow-lg">Hot</span>
                </div>
                <div class="p-4 space-y-2">
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${p.brand || ""}</p>
                        <h3 class="font-semibold text-sm text-slate-800 dark:text-slate-100 truncate group-hover:text-primary transition-colors">${p.tenSanPham || ""}</h3>
                    </div>
                    <p class="font-bold text-primary text-base">${Number(p.gia).toLocaleString("vi-VN")}₫</p>
                </div>
            </a>
            <div class="flex gap-2 pt-3 px-4 pb-4">
                <button class="add-to-cart-home flex-[1.6] flex items-center justify-center gap-1 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-[9px] font-semibold py-2 px-3 rounded-xl whitespace-nowrap hover:bg-primary dark:hover:bg-primary dark:hover:text-white transition-all duration-300 uppercase tracking-wide"
                    data-id="${p.id}"
                    data-name="${p.tenSanPham}"
                    data-price="${p.gia}"
                    data-image="${p.anhChinh}"
                    data-brand="${p.brand || ""}"
                    type="button">
                    <span class="material-symbols-outlined text-xs">shopping_cart</span>
                    Thêm vào giỏ
                </button>
                <button class="flex-[1] flex items-center justify-center gap-1 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-[9px] font-semibold py-2 px-3 rounded-xl whitespace-nowrap hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white transition-all duration-300 uppercase tracking-wide"
                    onclick="window.location.href='/detail/${p.id}'"
                    type="button">
                    <span class="material-symbols-outlined text-xs">visibility</span>
                    Chi tiết
                </button>
            </div>
        </div>
    `).join("");
        // Gắn sự kiện thêm vào giỏ hàng nếu cần (giống best-sellers)
        list.addEventListener("click", async function (e) {
            const btn = e.target.closest(".add-to-cart-home");
            if (!btn) return;
            e.stopPropagation();
            e.preventDefault();
            const product = {
                id: btn.getAttribute("data-id"),
                name: btn.getAttribute("data-name"),
                price: btn.getAttribute("data-price"),
                image: btn.getAttribute("data-image"),
                brand: btn.getAttribute("data-brand"),
                quantity: 1,
            };
            // ... (copy logic thêm vào giỏ hàng từ best-sellers)
        });
    }

    // Gọi API khi trang load xong
    document.addEventListener("DOMContentLoaded", function () {
        fetch("/api/products/featured")
            .then(res => res.json())
            .then(data => renderFeaturedProducts(data));
    });


</script>
</html>
