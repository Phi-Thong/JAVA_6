    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            let stompClient = null;
            let currentConversationId = 1;

            const input = document.querySelector('input[placeholder="Nhập tin nhắn..."]');
            const sendBtn = document.querySelector('.bg-blue-600.text-white');

            // =========================
            // CONNECT WEBSOCKET
            // =========================
            function connectAdminChat(conversationId) {
                if (stompClient) stompClient.disconnect();

                const socket = new SockJS('/ws-chat');
                stompClient = Stomp.over(socket);

                stompClient.connect({}, function () {
                    console.log("ADMIN CONNECTED");

                    stompClient.subscribe('/topic/conversation.' + conversationId, function (message) {
                        console.log("ADMIN RECEIVED:", message.body);

                        const msg = JSON.parse(message.body);
                        appendAdminMessage(msg);
                    });
                });
            }

            // =========================
            // SEND MESSAGE
            // =========================
            function sendAdminMessage(content) {
                if (stompClient && currentConversationId) {
                    const msg = {
                        conversationId: currentConversationId,
                        content: content,
                        senderId: 16,
                        senderName: "Nhân viên"
                    };

                    stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(msg));

                    // hiển thị ngay (không chờ server)

                }
            }

            // =========================
            // CLICK SEND
            // =========================
            sendBtn.addEventListener('click', function () {
                const content = input.value.trim();
                if (!content) return;

                sendAdminMessage(content);
                input.value = '';
            });

            // =========================
            // ENTER SEND
            // =========================
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendBtn.click();
                }
            });

            // =========================
            // RENDER MESSAGE
            // =========================
            function appendAdminMessage(msg) {
                const chatBody = document.getElementById('admin-chat-body');

                const isAdmin = msg.senderId === 16;

                const div = document.createElement('div');
                div.className = 'flex flex-col ' + (isAdmin ? 'items-end' : 'items-start');

                div.innerHTML = `
        <div class="flex items-end ${isAdmin ? 'flex-row-reverse' : ''} gap-2 max-w-[80%]">

            <div class="${
                    isAdmin
                        ? 'bg-blue-600 text-white'
                        : 'bg-gray-200 text-black'
                } px-4 py-3 rounded-2xl ${
                    isAdmin ? 'rounded-br-none' : 'rounded-bl-none'
                } shadow-md">

                <p class="text-sm leading-relaxed">${msg.content}</p>
            </div>

            <span class="text-[10px] text-slate-400 mb-1">
                ${new Date().toLocaleTimeString('vi-VN', {
                    hour: '2-digit',
                    minute: '2-digit'
                })}
            </span>
        </div>
    `;

                chatBody.appendChild(div);
                chatBody.scrollTop = chatBody.scrollHeight;
            }

            // =========================
            // INIT
            // =========================
            connectAdminChat(currentConversationId);

        });
    </script>
