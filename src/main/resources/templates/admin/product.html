    <style>
        .delete-modal-content {
            min-width: 280px;
            max-width: 320px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 6px 32px rgba(220, 38, 38, 0.18), 0 1.5px 8px rgba(0, 0, 0, 0.07);
            border-top: 5px solid #ef4444;
            text-align: center;
            padding: 22px 20px 18px 20px;
            animation: fadeInModal 0.25s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeInModal {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .delete-modal-icon {
            background: #fee2e2;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .delete-modal-icon .material-symbols-outlined {
            color: #dc2626;
            font-size: 28px;
        }

        .delete-modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #dc2626;
            margin-bottom: 6px;
        }

        .delete-modal-text {
            font-size: 15px;
            color: #991b1b;
            margin-bottom: 18px;
        }

        .delete-modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .delete-btn {
            background: #dc2626;
            color: #fff;
            font-weight: 600;
            border: none;
            border-radius: 7px;
            padding: 7px 20px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.18s;
        }

        .delete-btn:hover {
            background: #b91c1c;
        }

        .cancel-btn {
            background: #fff;
            color: #dc2626;
            font-weight: 600;
            border: 1.5px solid #dc2626;
            border-radius: 7px;
            padding: 7px 20px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.18s, color 0.18s;
        }

        .cancel-btn:hover {
            background: #fee2e2;
            color: #b91c1c;
        }

        /* Fade in */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeInUp 0.5s ease;
        }

        /* Box icon dễ thương */
        .empty-box {
            font-size: 48px;
            animation: float 2.5s ease-in-out infinite;
        }

        /* Lắc nhẹ nhẹ cho “có hồn” */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-6px);
            }
            100% {
                transform: translateY(0px);
            }
        }

    <script>

        const subImageCache = new Map();
        document.addEventListener("DOMContentLoaded", () => {
            console.log("🔥 Product form system ready");

            // =========================
            // CACHE ẢNH PHỤ (QUAN TRỌNG)
            // =========================
            const subImageCache = new Map();

            // =========================
            // CLICK CHỌN ẢNH PHỤ (EVENT DELEGATION)
            // =========================
            document.body.addEventListener("click", function (e) {
                const thumb = e.target.closest(".sub-thumb");
                if (!thumb) return;

                const input = thumb.querySelector('input[type="file"]');
                if (input) input.click();
            });

            // =========================
            // CHANGE FILE (LƯU CACHE)
            // =========================
            document.body.addEventListener("change", function (e) {
                if (e.target.classList.contains("subInput")) {
                    const files = Array.from(e.target.files || []);
                    if (files.length > 0) {
                        subImageCache.set(e.target, files);
                        console.log("📸 Đã chọn file:", files[0]);
                    }
                }
            });

            // =========================
            // SUBMIT FORM
            // =========================
            document.body.addEventListener("submit", async function (e) {
                if (!e.target || e.target.id !== "productForm") return;

                e.preventDefault();

                console.log("🔥 SUBMIT TRIGGERED");

                // ===== GET VALUES =====
                const name = document.getElementById("nameInput")?.value.trim();
                // const sku = document.getElementById("skuInput")?.value.trim(); // BỎ QUA
                const brand = document.getElementById("brandInput")?.value;
                const price = document.getElementById("priceInput")?.value.trim();
                const desc = document.getElementById("descInput")?.value.trim();

                const mainImage = document.getElementById("mainImageInput")?.files[0];

                // =========================
                // FIX BUG: LẤY ẢNH PHỤ TỪ CACHE
                // =========================
                const subImages = Array.from(subImageCache.values())
                    .flat()
                    .filter(Boolean);

                console.log("Số ảnh phụ đã chọn:", subImages.length, subImages);

                const errorDiv = document.getElementById("formError");
                if (!errorDiv) return;

                errorDiv.textContent = "";

                let error = null;

                // ===== VALIDATION =====
                const isEdit = !!window.editingProductId; // true nếu đang chỉnh sửa, false nếu thêm mới

                if (!name) error = "Vui lòng nhập tên sản phẩm!";
// else if (!sku) error = "Vui lòng nhập mã sản phẩm!"; // BỎ QUA
                else if (!brand) error = "Vui lòng chọn thương hiệu!";
                else if (!price) error = "Vui lòng nhập giá!";
                else if (!/^\d+([.,]\d+)?$/.test(price.replace(/,/g, "")))
                    error = "Giá phải là số!";
                else if (parseFloat(price.replace(/,/g, "")) <= 0)
                    error = "Giá phải lớn hơn 0!";
                else if (!desc) error = "Vui lòng nhập mô tả!";
// CHỈ bắt buộc chọn ảnh chính khi THÊM MỚI
                else if (!isEdit && !mainImage) error = "Vui lòng chọn ảnh chính!";
// CHỈ bắt buộc chọn đủ 4 ảnh phụ khi THÊM MỚI
                else if (!isEdit && subImages.length < 4) error = "Vui lòng chọn đủ 4 ảnh phụ!";

                // ===== ERROR HANDLING =====
                if (error) {
                    console.log(" VALIDATION ERROR:", error);
                    errorDiv.textContent = error;

                    if (!name) document.getElementById("nameInput")?.focus();
                    // else if (!sku) document.getElementById("skuInput")?.focus(); // BỎ QUA
                    else if (!brand) document.getElementById("brandInput")?.focus();
                    else if (!price) document.getElementById("priceInput")?.focus();
                    else if (!desc) document.getElementById("descInput")?.focus();
                    else if (!mainImage)
                        document.getElementById("mainImageInput")?.focus();

                    return;
                }

                const formData = new FormData();
                formData.append("name", name);
                // formData.append("sku", sku); // BỎ QUA
                formData.append("brandId", brand);
                formData.append("price", price);
                formData.append("desc", desc);
                if (mainImage) {
                    formData.append("mainImage", mainImage);
                }

                subImages.forEach((file) => formData.append("subImages", file));

                try {
                    showLoadingOverlay(); // Hiện overlay loading

                    // Đợi 4 giây để hiển thị overlay
                    await new Promise(resolve => setTimeout(resolve, 4000));

                    const res = await fetch("/api/product-create", {
                        method: "POST",
                        body: formData,
                    });

                    const data = await res.json();

                    hideLoadingOverlay(); // Ẩn overlay loading

                    if (data.status === "success") {
                        showNotification("Thêm sản phẩm thành công!", 2500);
                        document.getElementById("productForm")?.reset();
                        subImageCache.clear();
                        // Reset preview ảnh chính
                        const mainPreview = document.getElementById("mainImagePreview");
                        if (mainPreview) {
                            mainPreview.innerHTML = `
            <span class="material-symbols-outlined text-3xl text-primary mb-2">add_a_photo</span>
            <p class="text-sm font-medium text-slate-900">Tải lên ảnh chính</p>
            <p class="text-xs text-slate-400 mt-1">Dung lượng tối đa 5MB</p>
        `;
                        }

                        // Reset preview ảnh phụ
                        document.querySelectorAll('.sub-thumb').forEach(thumb => {
                            thumb.innerHTML = `
            <input type="file" accept="image/*" class="hidden subInput"/>
            <span class="material-symbols-outlined text-slate-400">add</span>
        `;
                        });

                        // Chuyển sang tab danh sách sản phẩm
                        showTab("productListContent");
                        loadProductsSmooth(0); // 🔥 thêm dòng này
                    } else {
                        errorDiv.textContent = data.message || "Có lỗi xảy ra!";
                    }
                } catch (err) {
                    hideLoadingOverlay(); // Ẩn overlay nếu có lỗi
                    console.error(err);
                    errorDiv.textContent = "Không thể gửi dữ liệu lên server!";
                }
            });
        });

        function showNotification(message, duration = 2000) {
            const noti = document.getElementById("notification");
            if (!noti) return;
            noti.textContent = message;
            noti.style.display = "block";
            noti.style.opacity = "1";
            if (noti._timeout) clearTimeout(noti._timeout);
            noti._timeout = setTimeout(() => {
                noti.style.opacity = "0";
                setTimeout(() => noti.style.display = "none", 300);
            }, duration);
        }

        function showLoadingOverlay() {

        // Hàm render phân trang
        function renderPagination(totalPages, currentPage) {
            const paginationDiv = document.querySelector(".p-4 .flex.gap-1");
            if (!paginationDiv) return;

            paginationDiv.innerHTML = "";

            const range = 1;
            let pages = [];

            // Gần đầu
            if (currentPage <= 1) {
                for (let i = 0; i < Math.min(3, totalPages); i++) {
                    pages.push(i);
                }
                if (totalPages > 3) {
                    pages.push("...");
                    pages.push(totalPages - 1);
                }
            }
            // Gần cuối
            else if (currentPage >= totalPages - 2) {
                pages.push(0);
                pages.push("...");
                for (let i = totalPages - 3; i < totalPages; i++) {
                    if (i >= 0) pages.push(i);
                }
            }
            // Ở giữa
            else {
                pages.push(0);
                pages.push("...");

                for (let i = currentPage - range; i <= currentPage + range; i++) {
                    pages.push(i);
                }

                pages.push("...");
                pages.push(totalPages - 1);
            }

            // render
            pages.forEach(p => {
                if (p === "...") {
                    const dot = document.createElement("span");
                    dot.textContent = "...";
                    dot.className = "px-2 text-slate-400";
                    paginationDiv.appendChild(dot);
                } else {
                    const btn = document.createElement("button");
                    btn.textContent = p + 1;
                    btn.className =
                        "px-3 py-1 rounded " +
                        (p === currentPage
                            ? "bg-primary text-white"
                            : "bg-white text-primary");

                    btn.onclick = () => loadProductsSmooth(p);
                    paginationDiv.appendChild(btn);
                }
            });
        }

                });
                const data = await res.json();
                hideLoadingOverlay();

                if (data.status === "success") {
                    showNotification("Cập nhật sản phẩm thành công!", 2500);
                    document.getElementById("productForm").reset();
                    subImageCache.clear();
                    window.editingProductId = null;
                    // Chuyển về tab danh sách và reload
                    showTab("productListContent");

                } else {
                    errorDiv.textContent = data.message || "Có lỗi xảy ra!";
                }
            } catch (err) {
                hideLoadingOverlay();
                errorDiv.textContent = "Không thể gửi dữ liệu lên server!";
            }
        });

        //
        if (data.status === "success") {
            showNotification("Cập nhật sản phẩm thành công!", 2500);
            document.getElementById("productForm").reset();
            subImageCache.clear();
            window.editingProductId = null;

            // Reset preview ảnh chính
            const mainPreview = document.getElementById("mainImagePreview");
            if (mainPreview) {
                mainPreview.innerHTML = `
            <span class="material-symbols-outlined text-3xl text-primary mb-2">add_a_photo</span>
            <p class="text-sm font-medium text-slate-900">Tải lên ảnh chính</p>
            <p class="text-xs text-slate-400 mt-1">Dung lượng tối đa 5MB</p>
        `;
            }

            // Reset preview ảnh phụ
            document.querySelectorAll('.sub-thumb').forEach(thumb => {
                thumb.innerHTML = `
            <input type="file" accept="image/*" class="hidden subInput"/>
            <span class="material-symbols-outlined text-slate-400">add</span>
        `;
            });

            // Chuyển về tab danh sách và reload
            showTab("productListContent");

            loadProductsSmooth(0); // 🔥 thêm dòng này
        }
    </script>
</main>
