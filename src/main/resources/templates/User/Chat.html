        // =========================
        // KEYWORD BOT (UPGRADED)
        // =========================
        function generateAutoReply(msg) {
            msg = msg.toLowerCase();

            // ===== GREETING =====
            if (msg.includes('xin chào') || msg.includes('hello') || msg.includes('hi')) {
                return 'Xin chào, chúng tôi có thể hỗ trợ gì cho bạn';
            }

            // ===== PRICE =====
            if (msg.includes('giá') || msg.includes('bao nhiêu') || msg.includes('price')) {
                return 'Vui lòng cung cấp sản phẩm cụ thể để báo giá chính xác';
            }

            // ===== SHIPPING =====
            if (msg.includes('ship') || msg.includes('giao hàng') || msg.includes('vận chuyển')) {
                return 'Chúng tôi giao hàng toàn quốc từ 2 đến 5 ngày làm việc';
            }

            // ===== ORDER =====
            if (msg.includes('đặt hàng') || msg.includes('mua') || msg.includes('order')) {
                return 'Bạn có thể thêm sản phẩm vào giỏ hàng để tiến hành thanh toán';
            }

            // ===== SUPPORT =====
            if (msg.includes('hỗ trợ') || msg.includes('help') || msg.includes('giúp')) {
                return 'Vui lòng mô tả chi tiết vấn đề để chúng tôi hỗ trợ nhanh nhất';
            }

            // ===== PAYMENT =====
            if (msg.includes('thanh toán') || msg.includes('pay')) {
                return 'Chúng tôi hỗ trợ chuyển khoản và thanh toán khi nhận hàng';
            }

            // ===== REFUND =====
            if (msg.includes('hoàn tiền') || msg.includes('trả hàng')) {
                return 'Chính sách hoàn trả trong vòng 7 ngày nếu sản phẩm lỗi';
            }

            // ===== ACCOUNT =====
            if (msg.includes('tài khoản') || msg.includes('login') || msg.includes('đăng nhập')) {
                return 'Bạn có thể đăng nhập bằng email hoặc số điện thoại đã đăng ký';
            }

            // ❌ KHÔNG CÓ KEYWORD
            return 'Chúng tôi sẽ liên hệ nhân viên hỗ trợ, vui lòng đợi trong giây lát';
        }

        window.goodFeedback = function () {

        window.badFeedback = function () {

        // =========================
        // UI MESSAGE
        // =========================
        function appendMessage(sender, text, isUser) {
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.justifyContent = isUser ? 'flex-end' : 'flex-start';

            div.innerHTML = `
            <div style="

                padding: 8px 12px;
                border-radius: 14px;
                font-size: 13px;
                line-height: 1.4;
                background: ${isUser ? '#3b82f6' : '#e5e7eb'};
                color: ${isUser ? '#fff' : '#111827'};
                word-break: break-word;
            ">
                ${text}
            </div>
        `;

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const label = document.getElementById("chat-ai-label");

            function showLabel() {
                // hiện
                label.style.opacity = "1";
                label.style.transform = "translateY(0)";

                // sau 2 giây thì ẩn
                setTimeout(() => {
                    label.style.opacity = "0";
                    label.style.transform = "translateY(10px)";
                }, 2000);
            }

            // lần đầu: đợi 8 giây rồi hiện
            setTimeout(() => {
                showLabel();

                // sau đó lặp: mỗi 10 giây (8s nghỉ + 2s hiện)
                setInterval(() => {
                    showLabel();
                }, 10000);

            }, 8000);
        });

        // Hàm kiểm tra cookie jwt
        function hasJwtCookie() {
            return document.cookie.split(';').some((c) => c.trim().startsWith('jwt='));
        }

        let stompClient = null;
        let conversationId = null;
        // let conversationId = 1; // luôn là number
        // let userId = 15;
        function getJwtFromCookie() {
            const match = document.cookie.match(/(^| )jwt=([^;]+)/);
            return match ? match[2] : null;
        }

        function getUserIdFromJwt() {
            const token = getJwtFromCookie();
            if (!token) return null;
            const payload = jwt_decode(token);
            // Tùy backend, có thể là payload.userId hoặc payload.sub (phải là số)
            return payload.userId || payload.sub;
        }

        let userId = getUserIdFromJwt();
        console.log("UserId lấy từ JWT:", userId); // Kiểm tra, phải là số (vd: 15)

        // =======================
        // INIT
        // =======================
        document.addEventListener("DOMContentLoaded", function () {

            // Hiện widget nếu có jwt
            if (hasJwtCookie()) {
                document.getElementById("chat-widget-container").style.display = "block";
            }

            // Kết nối websocket
            connectChatWebSocket();
        });


        // =======================
        // CONNECT WEBSOCKET
        // =======================
        function connectChatWebSocket() {
            const socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function () {

                console.log("WS CONNECTED");

                stompClient.subscribe('/topic/conversation.' + conversationId, function (message) {

                    console.log("USER RECEIVED:", message.body);

                    const msg = JSON.parse(message.body);

                    // phân biệt user hay admin
                    const isUser = msg.senderId === userId;

                    appendMessage(
                        msg.senderName || "Nhân viên",
                        msg.content,
                        isUser
                    );
                });

            }, function (error) {
                console.error("WS ERROR:", error);
            });
        }


        // =======================
        // SEND MESSAGE
        // =======================
        function sendChatMessage(content) {
            if (!stompClient || !stompClient.connected) {
                console.error("WebSocket chưa connect");
                return;
            }

            const msg = {
                conversationId: conversationId,
                content: content,
                senderId: userId,
                senderName: "Bạn"
            };

            stompClient.send(
                "/app/chat.sendMessage",
                {},
                JSON.stringify(msg)
            );
        }


        // =======================
        // FORM SUBMIT
        // =======================
        form.onsubmit = function (e) {
            e.preventDefault();

            const msg = input.value.trim();
            if (!msg) return;
            // appendMessage('Bạn', msg, true);

            // hiển thị ngay lập tức


            input.value = '';

            // gửi websocket
            sendChatMessage(msg);
        };

        // lịch sử chat
        async function loadHistory() {
            const res = await fetch('/api/chat/history/' + conversationId);
            const data = await res.json();

            messages.innerHTML = ''; // clear tránh trùng

            data.forEach(msg => {
                appendMessage(
                    msg.senderName,
                    msg.content,
                    msg.senderId === userId // test userId = 15
                );
            });
        }

        // phần hàm sau khi chạy được ròio
        async function getOrCreateConversationId() {
            const res = await fetch('/api/chat/conversation/current');
            const data = await res.json();
            return data.conversationId;
        }
    </script>
