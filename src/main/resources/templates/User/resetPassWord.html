<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Đặt lại mật khẩu - Sneaker Store</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries">
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3B82F6', // Softer blue from reference image
                        brandDark: '#111111',
                    }
                }
            }
        }
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3B82F6', // Softer blue from reference image
                        brandDark: '#111111',
                    }
                }
            }
        }
    </script>
    <style data-purpose="custom-shadows">
        .soft-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-brandDark antialiased">
<!-- BEGIN: MainContainer -->
<main class="min-h-screen flex items-center justify-center p-6">
    <!-- BEGIN: ResetPasswordCard -->
    <div class="w-full max-w-md bg-white rounded-3xl p-8 md:p-10 shadow-xl border border-blue-100">

        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="w-14 h-14 bg-blue-500 rounded-full flex items-center justify-center shadow-md shadow-blue-200">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M13 10V3L4 14h7v7l9-11h-7z"
                          stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                </svg>
            </div>
        </div>

        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-500 mb-2">
                Đặt lại mật khẩu
            </h1>
            <p class="text-blue-300 text-sm">
                Nhập mật khẩu mới của bạn bên dưới.
            </p>
        </header>

        <!-- Form -->
        <form class="space-y-6" method="POST">

            <!-- Password -->
            <!-- Password -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-blue-500 ml-1">
                    Mật khẩu mới
                </label>
                <input type="password"
                       class="w-full px-4 py-3 rounded-xl border border-blue-200 bg-blue-50
                  focus:border-blue-400 focus:ring-2 focus:ring-blue-100
                  placeholder-blue-300 text-gray-700
                  transition-all outline-none"
                       placeholder="••••••••" required>
            </div>

            <!-- Confirm -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-blue-500 ml-1">
                    Xác nhận mật khẩu mới
                </label>
                <input type="password"
                       class="w-full px-4 py-3 rounded-xl border border-blue-200 bg-blue-50
                  focus:border-blue-400 focus:ring-2 focus:ring-blue-100
                  placeholder-blue-300 text-gray-700
                  transition-all outline-none"
                       placeholder="••••••••" required>
            </div>

            <!-- Button -->
            <div class="pt-2">
                <button type="submit"
                        class="w-full bg-blue-400 text-white font-bold py-3.5 rounded-xl
                           hover:bg-blue-500 transition-all duration-200
                           shadow-lg shadow-blue-200">
                    Cập nhật mật khẩu
                </button>
            </div>

        </form>

        <!-- Footer -->
        <div class="mt-8 text-center">
            <a href="/login"
               class="text-sm font-medium text-blue-400 hover:text-blue-600 transition-colors">
                ← Quay lại đăng nhập
            </a>
        </div>

    </div>
    <!-- END: ResetPasswordCard -->
</main>
<!-- END: MainContainer -->
<script data-purpose="form-validation">
    // Simple client-side validation logic placeholder
    const form = document.querySelector('form');
    form.addEventListener('submit', (e) => {
        const pwd = document.getElementById('password').value;
        const confirmPwd = document.getElementById('confirm-password').value;

        if (pwd !== confirmPwd) {
            e.preventDefault();
            alert('Mật khẩu xác nhận không khớp. Vui lòng kiểm tra lại!');
        }
    });
</script>
</body>
</html>
