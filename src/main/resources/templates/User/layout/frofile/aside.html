<aside class="w-full lg:w-1/4" th :fragment="sidebar">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sticky-sidebar h-full"
         data-purpose="user-sidebar">
        <!-- User Profile Header -->
        <div class="flex flex-col items-center text-center mb-8">
            <div class="relative group cursor-pointer">
                <img alt="Avatar [[${user.hoTen}]]"
                     class="w-24 h-24 rounded-full object-cover border-4 border-gray-50 shadow-sm"
                     id="avatar-preview"
                     th:src="${user.avatar != null && !#strings.isEmpty(user.avatar) ? user.avatar : '/img/default.jpg'}"/>
                <input type="file" id="avatar-input" accept="image/*" style="display:none"/>
                <div class="absolute inset-0 bg-black/20 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                     onclick="document.getElementById('avatar-input').click()">
                    <i class="text-white w-6 h-6" data-lucide="camera"></i>
                </div>
            </div>
            <h2 class="mt-4 font-bold text-lg text-gray-800" th:text="${user.hoTen}">Tên người dùng</h2>
            <p class="text-sm text-gray-500" th:text="${user.email}">email@example.com</p>
        </div>
        <!-- Navigation Tabs -->
        <nav class="space-y-1" data-purpose="profile-navigation">
            <button class="tab-btn active-tab flex items-center w-full px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200 hover:bg-gray-50 group"
                    data-tab="profile" onclick="switchTab('profile')">
                <i class="w-5 h-5 mr-3 text-gray-400 group-hover:text-black" data-lucide="user"></i>
                Thông tin cá nhân
            </button>
            <button class="tab-btn flex items-center w-full px-4 py-3 text-sm font-medium text-gray-600 rounded-xl transition-all duration-200 hover:bg-gray-50 group"
                    data-tab="orders" onclick="switchTab('orders')">
                <i class="w-5 h-5 mr-3 text-gray-400 group-hover:text-black" data-lucide="shopping-bag"></i>
                Lịch sử đơn hàng
            </button>
            <button class="tab-btn flex items-center w-full px-4 py-3 text-sm font-medium text-gray-600 rounded-xl transition-all duration-200 hover:bg-gray-50 group"
                    data-tab="security" onclick="switchTab('security')">
                <i class="w-5 h-5 mr-3 text-gray-400 group-hover:text-black" data-lucide="shield-check"></i>
                Bảo mật tài khoản
            </button>
            <hr class="my-4 border-gray-100"/>
            <a
                    href="/logout"
                    class="flex items-center w-full px-4 py-3 text-sm font-medium text-red-500 rounded-xl transition-all duration-200 hover:bg-red-50 group"
            >
                <span class="material-symbols-outlined text-lg mr-3">logout</span>
                Đăng xuất
            </a>
        </nav>
    </div>
    <script>
        document.getElementById('avatar-input').addEventListener('change', async function () {
            const file = this.files[0];
            if (!file) return;

            // Hiển thị ảnh preview ngay
            const reader = new FileReader();
            reader.onload = function (e) {
                document.getElementById('avatar-preview').src = e.target.result;
            };
            reader.readAsDataURL(file);

            // Gửi file lên backend qua fetch API
            const formData = new FormData();
            formData.append('avatar', file);

            try {
                const res = await fetch('/user/api/avatar', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (!res.ok) {
                    document.getElementById('error-message').textContent = data.message || 'Cập nhật ảnh thất bại!';
                } else {
                    document.getElementById('error-message').textContent = '';
                    // Nếu backend trả về link ảnh mới, cập nhật lại src:
                    if (data.avatarUrl) {
                        document.getElementById('avatar-preview').src = data.avatarUrl;
                        // Cập nhật avatar trên header nếu có
                        const headerAvatar = document.getElementById('header-avatar');
                        if (headerAvatar) headerAvatar.src = data.avatarUrl;
                    }
                    // Hiển thị toast nếu muốn
                    const toast = document.getElementById('toast-success');
                    toast.textContent = 'Cập nhật ảnh thành công!';
                    toast.style.display = 'block';
                    setTimeout(() => {
                        toast.style.display = 'none';
                        toast.textContent = 'Cập nhật thành công!';
                    }, 2000);
                }
            } catch (err) {
                document.getElementById('error-message').textContent = 'Có lỗi kết nối!';
            }
        });
    </script>
</aside>
