<!doctype html>

<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Đăng nhập | StepUp Footwear</title>
    <!-- Tailwind CSS v3 CDN with Plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
            rel="stylesheet"
    />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                    },
                    colors: {
                        brand: {
                            primary: "#1a1a1a",
                            accent: "#000000", // Minimalist Black accent for Nike/Adidas feel
                            muted: "#71717a",
                        },
                    },
                },
            },
        };
    </script>
    <style data-purpose="custom-transitions">
        .hover-scale {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hover-scale:hover {
            transform: scale(1.01);
        }

        .input-focus-glow:focus {
            border-color: #000;
            ring-color: #000;
        }
    </style>
</head>
<body class="font-sans antialiased text-slate-900 bg-slate-50">
<!-- BEGIN: MainContainer -->
<!-- Added padding and flex-col to allow for future header/footer placement -->
<main
        class="flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8 min-h-[600px]"
>
    <!-- Login Card Container: Compact & Centered -->
    <div
            class="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row border border-slate-100"
            data-purpose="login-card"
    >
        <!-- BEGIN: LeftBannerSection (Visual Side) -->
        <a
                href="/home"
                class="hidden md:block md:w-5/12 relative overflow-hidden bg-zinc-900 group"
        >
            <section class="w-full h-full" data-purpose="marketing-banner">
                <!-- IMAGE -->
                <img
                        alt="Cinematic Sneaker Banner"
                        class="absolute inset-0 h-full w-full object-cover opacity-80 transition duration-700 ease-out group-hover:scale-110 group-hover:opacity-100"
                        src="https://images.unsplash.com/photo-1562424995-2efe650421dd?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                />

                <!-- OVERLAY -->
                <div
                        class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex flex-col justify-end p-8 transition duration-500 group-hover:from-black/95"
                >
                    <div
                            class="max-w-xs transform transition duration-500 group-hover:translate-y-[-5px]"
                    >
                        <h2 class="text-2xl font-bold text-white mb-2 leading-tight">
                            Nâng tầm phong cách
                        </h2>

                        <p
                                class="text-zinc-400 text-sm group-hover:text-zinc-200 transition"
                        >
                            Bộ sưu tập mới nhất từ các thương hiệu hàng đầu thế giới.
                        </p>
                    </div>
                </div>
            </section>
        </a>
        <!-- END: LeftBannerSection -->
        <!-- BEGIN: RightLoginFormSection (Action Side) -->
        <section
                class="w-full md:w-7/12 flex items-center justify-center p-8 sm:p-12 bg-white"
                data-purpose="login-form-container"
        >
            <div class="w-full max-w-sm space-y-8">
                <!-- Header & Logo -->
                <div class="text-center md:text-left">
                    <div
                            class="flex items-center gap-2 justify-center md:justify-start"
                    >
                        <!-- Icon -->
                        <svg
                                xmlns="http://www.w3.org/2000/svg"
                                class="w-6 h-6 text-blue-400"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke="currentColor"
                        >
                            <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M5.121 17.804A9 9 0 1118.364 6.64M15 11a3 3 0 11-6 0 3 3 0 016 0z"
                            />
                        </svg>

                        <!-- Title -->
                        <h1 class="text-2xl font-bold tracking-tight text-blue-400">
                            Chào mừng trở lại
                        </h1>
                    </div>

                    <p class="mt-2 text-slate-500 text-sm">
                        Vui lòng nhập thông tin để tiếp tục.
                    </p>
                </div>
                <!-- Form Elements -->
                <form
                        action="/login"
                        class="space-y-5"
                        id="login-form"
                        method="POST"
                >
                    <!-- Vùng thông báo lỗi lấy từ controller -->
                    <div
                            th:if="${errorMessage}"
                            class="text-red-500 text-sm font-semibold text-center"
                    >
                        <span th:text="${errorMessage}"></span>
                    </div>
                    <!-- Email Input -->
                    <div class="space-y-1.5">
                        <label
                                class="text-xs font-semibold uppercase tracking-wider text-slate-500"
                                for="email"
                        >Email</label
                        >
                        <input
                                class="block w-full rounded-lg border-slate-200 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:border-black focus:ring-0 transition-all text-sm"
                                id="email"
                                name="username"
                                placeholder="Email của bạn"

                                type="email"
                        />
                    </div>
                    <!-- Password Input -->
                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center">
                            <label
                                    class="text-xs font-semibold uppercase tracking-wider text-slate-500"
                                    for="password"
                            >Mật khẩu</label
                            >
                        </div>
                        <input
                                class="block w-full rounded-lg border-slate-200 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:border-black focus:ring-0 transition-all text-sm"
                                id="password"
                                name="password"
                                placeholder="Mật khẩu"
                               
                                type="password"
                        />
                    </div>
                    <!-- Remember Me -->
                    <div class="flex items-center">
                        <input
                                class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary"
                                id="remember-me"
                                name="remember-me"
                                type="checkbox"
                        />
                        <label
                                class="ml-2 block text-xs font-medium text-slate-600"
                                for="remember-me"
                        >Ghi nhớ đăng nhập</label
                        >
                        <a
                                class="text-xs font-bold text-blue-300 hover:text-blue-400 hover:underline underline-offset-4"
                                style="margin-left: 130px"
                                th:href="@{/formEmail}"
                        >
                            Quên mật khẩu?
                        </a>
                    </div>
                    <!-- Submit Button -->
                    <button
                            class="w-full bg-blue-300 text-white py-3.5 px-4 rounded-lg font-bold hover:bg-blue-400 hover-scale shadow-sm hover:shadow-md transition-all active:scale-95 text-sm uppercase tracking-widest"
                            type="submit"
                    >
                        Đăng nhập
                    </button>
                </form>
                <!-- Divider -->
                <div class="flex items-center my-4">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="mx-3 text-xs text-slate-400 font-medium">HOẶC</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                </div>

                <!-- Social Login -->
                <div class="grid grid-cols-2 gap-3">
                    <!-- Google -->
                    <button
                            type="button"
                            onclick="loginGoogle()"
                            class="flex items-center justify-center gap-2 border border-slate-200 rounded-lg py-2.5 text-sm font-medium hover:bg-slate-50 transition"
                    >
                        <img
                                src="https://www.svgrepo.com/show/475656/google-color.svg"
                                class="w-5 h-5"
                                alt="Google"
                        />
                        Google
                    </button>

                    <!-- Facebook -->
                    <button
                            type="button"
                            class="flex items-center justify-center gap-2 border border-slate-200 rounded-lg py-2.5 text-sm font-medium hover:bg-slate-50 transition"
                    >
                        <img
                                src="https://www.svgrepo.com/show/475647/facebook-color.svg"
                                class="w-5 h-5"
                                alt="Facebook"
                        />
                        Facebook
                    </button>
                </div>

                <!-- Footer Link -->
                <p class="text-center text-xs text-slate-500 pt-2">
                    Chưa có tài khoản?
                    <a
                            th:href="@{/register}"
                            class="font-bold text-blue-300 hover:text-blue-400 hover:underline underline-offset-4"
                            href="#"
                    >
                        Tạo tài khoản ngay
                    </a>
                </p>
            </div>
        </section>
        <!-- END: RightLoginFormSection -->
    </div>
</main>
