<div class="tab-content active bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 h-full"
     id="profile-content" th:fragment="profile">
    <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold">Thông tin cá nhân</h3>

    </div>
    <form id="profile-form" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-1">
                <label class="text-sm font-semibold text-gray-700">Họ và tên</label>
                <input class="w-full rounded-lg border-gray-200 focus:ring-black focus:border-black transition-all"
                       type="text" th:value="${user.hoTen}" name="hoTen"/>
            </div>
            <div class="space-y-1">
                <label class="text-sm font-semibold text-gray-700">Email</label>
                <input class="w-full rounded-lg border-gray-200 focus:ring-black focus:border-black transition-all"
                       type="email" th:value="${user.email}" name="email" readonly/>
            </div>
            <div class="space-y-1">
                <label class="text-sm font-semibold text-gray-700">Số điện thoại</label>
                <input class="w-full rounded-lg border-gray-200 focus:ring-black focus:border-black transition-all"
                       type="tel" th:value="${user.sdt}" name="sdt"/>
            </div>
            <div class="space-y-1">
                <label class="text-sm font-semibold text-gray-700">Ngày sinh</label>
                <input class="w-full rounded-lg border-gray-200 focus:ring-black focus:border-black transition-all"
                       type="date" th:value="${user.ngaySinh}" name="ngaySinh"/>
            </div>
        </div>
        <div class="space-y-2">
            <label class="text-sm font-semibold text-gray-700 block">Giới tính</label>
            <div class="flex gap-6">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input class="text-black focus:ring-black" name="gender" type="radio" value="Nam"
                           th:checked="${user.gioiTinh == false}"/>
                    <span class="text-sm">Nam</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input class="text-black focus:ring-black" name="gender" type="radio" value="Nữ"
                           th:checked="${user.gioiTinh == true}"/>
                    <span class="text-sm">Nữ</span>
                </label>
            </div>
        </div>
        <div id="error-message" class="text-red-500 text-sm mb-2"></div>
        <div class="pt-4">
            <button class="text-white px-8 py-3 rounded-xl font-semibold transition-colors shadow-lg bg-blue-600 hover:bg-blue-700 shadow-blue-100"
                    type="submit">
                Lưu thay đổi
            </button>
        </div>
    </form>
    <div id="toast-success" style="display:none; position:fixed; top:32px; right:32px; z-index:9999;"
         class="bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg font-semibold transition-all">
        Cập nhật thành công!
    </div>
    <script>
        document.getElementById('profile-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = '';

            // Lấy dữ liệu từ form
            const hoTen = this.hoTen.value.trim();
            const sdt = this.sdt.value.trim();
            const ngaySinh = this.ngaySinh.value;
            const gender = this.gender.value;

            // Validate phía client
            if (!hoTen) {
                errorDiv.textContent = 'Họ và tên không được để trống!';
                return;
            }
            if (!/^\d{10,11}$/.test(sdt)) {
                errorDiv.textContent = 'Số điện thoại phải là 10-11 số!';
                return;
            }
            if (!ngaySinh) {
                errorDiv.textContent = 'Vui lòng chọn ngày sinh!';
                return;
            }

            // Gửi dữ liệu lên backend
            try {
                const res = await fetch('/user/api/profile', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        hoTen, sdt, ngaySinh, gioiTinh: gender === 'Nữ'
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorDiv.textContent = data.message || 'Cập nhật thất bại!';
                } else {
                    errorDiv.textContent = '';
                    // Cập nhật tên trên header nếu có
                    const headerName = document.getElementById('header-username');
                    if (headerName) headerName.textContent = hoTen;

                    const toast = document.getElementById('toast-success');
                    toast.style.display = 'block';
                    setTimeout(() => {
                        toast.style.display = 'none';
                    }, 2000);
                  
                }
            } catch (err) {
                errorDiv.textContent = 'Có lỗi kết nối!';
            }
        });
    </script>
</div>
